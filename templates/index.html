<!DOCTYPE html>
<html>
<head>
    <title>Moodify</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container-fluid mt-5">
    <h3 class="text-center">How do you feel today?</h3>

    <div class="row g-4 mt-3">

        <div class="col-lg-3 col-md-3 col-6">
            <div class="mood-card" data-mood="happy">😊 Happy</div>
        </div>

        <div class="col-lg-3 col-md-3 col-6">
            <div class="mood-card" data-mood="sad">😢 Sad</div>
        </div>

        <div class="col-lg-3 col-md-3 col-6">
            <div class="mood-card" data-mood="angry">😡 Angry</div>
        </div>

        <div class="col-lg-3 col-md-3 col-6">
            <div class="mood-card" data-mood="relaxed">😌 Relaxed</div>
        </div>

        <div class="col-lg-3 col-md-3 col-6">
            <div class="mood-card" data-mood="inspirational">💡 Inspirational</div>
        </div>

        <div class="col-lg-3 col-md-3 col-6">
            <div class="mood-card" data-mood="devotional">🙏 Devotional</div>
        </div>

        <div class="col-lg-3 col-md-3 col-6">
            <div class="mood-card" data-mood="romantic">❤️ Romantic</div>
        </div>

        <div class="col-lg-3 col-md-3 col-6">
            <div class="mood-card" data-mood="energetic">⚡ Energetic</div>
        </div>

        <div class="col-lg-3 col-md-3 col-6">
            <div class="mood-card" data-mood="focus">🧠 Focus</div>
        </div>

        <div class="col-lg-3 col-md-3 col-6">
            <div class="mood-card" data-mood="sleep">😴 Sleep</div>
        </div>

    </div>
</div>
    <!-- Form -->
    <form method="POST" action="/submit" id="moodForm">

    <input type="hidden" name="mood" id="selectedMood">

    <!-- Language (Hidden Initially) -->
    <div id="languageSection" class="mt-4 d-none">

        <h5>Select Language 🌍</h5>

        <select name="language" class="form-select">
            <option value="telugu">Telugu</option>
            <option value="hindi">Hindi</option>
            <option value="english">English</option>
            <option value="tamil">Tamil</option>
        </select>

        <button class="btn btn-light mt-3">Get Music 🎶</button>

    </div>

</form>

</div>

<!-- Songs -->
{% if songs %}
<div class="container mt-5">
    <h3 class="text-center">Songs for {{ mood }}</h3>

    <div class="row">

        {% for song in songs %}
        <div class="col-md-4 mb-4">

            <div class="card shadow">

                <img src="{{ song.thumbnail }}" class="img-fluid">

                <h6 class="p-2">{{ song.title }}</h6>

                <iframe width="100%" height="200"
                        src="{{ song.video }}"
                        allowfullscreen>
                </iframe>

            </div>

        </div>
        {% endfor %}

    </div>
</div>
{% endif %}

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/static/script.js"></script>

</body>
</html>
